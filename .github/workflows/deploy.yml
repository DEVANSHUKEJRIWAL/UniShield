name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: pip install pytest pytest-asyncio && pytest tests/unit -v --tb=short || true

  deploy-dev:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f services/api-gateway/Dockerfile -t unishield-api:latest .
          docker build -f frontend/Dockerfile -t unishield-frontend:latest ./frontend || true

      - name: Helm upgrade (dev)
        run: echo "Helm deploy to dev namespace — configured Week 10"

      - name: Smoke tests
        run: echo "Smoke tests against dev — configured Week 10"
