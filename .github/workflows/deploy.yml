name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          pip install -e ".[dev]"
          pip install -r unishield/requirements.txt
          PYTHONPATH=. pytest unishield/tests openclaw_sdk/tests -q --tb=short

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-pull base images (retry on registry timeout)
        run: |
          pull_with_retry() {
            local image=$1
            for attempt in 1 2 3 4; do
              if docker pull "$image"; then
                return 0
              fi
              echo "Pull failed for ${image} (attempt ${attempt}/4), retrying..."
              sleep $((attempt * 15))
            done
            return 1
          }
          pull_with_retry public.ecr.aws/docker/library/python:3.11-slim
          pull_with_retry public.ecr.aws/docker/library/node:20-alpine

      - name: Build Docker images
        run: |
          build_with_retry() {
            local dockerfile=$1 tag=$2 context=$3
            for attempt in 1 2 3; do
              if docker build -f "$dockerfile" -t "$tag" "$context"; then
                return 0
              fi
              echo "Build failed for ${tag} (attempt ${attempt}/3), retrying..."
              sleep $((attempt * 20))
            done
            return 1
          }
          build_with_retry services/api-gateway/Dockerfile unishield-api:staging .
          build_with_retry unishield/Dockerfile unishield-orchestrator:staging .
          build_with_retry frontend/Dockerfile unishield-frontend:staging ./frontend

      - name: Smoke test API health
        run: |
          docker rm -f unishield-smoke 2>/dev/null || true
          docker run -d --name unishield-smoke -p 18000:8000 \
            -e UNISHIELD_USE_SQLITE=1 \
            -e AUTO_SEED=false \
            unishield-api:staging
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18000/api/v1/health; then
              echo "Smoke test passed"
              docker rm -f unishield-smoke
              exit 0
            fi
            sleep 2
          done
          echo "Smoke test failed — container logs:"
          docker logs unishield-smoke || true
          docker rm -f unishield-smoke
          exit 1
