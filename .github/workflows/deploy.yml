name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          pip install -e ".[dev]"
          UNISHIELD_USE_SQLITE=1 pytest tests/ -q --tb=short

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f services/api-gateway/Dockerfile -t unishield-api:staging .
          docker build -f services/agent-worker/Dockerfile -t unishield-agent-worker:staging .
          docker build -f frontend/Dockerfile -t unishield-frontend:staging ./frontend

      - name: Helm lint
        run: |
          helm lint infra/helm/unishield -f infra/helm/unishield/values.local.yml

      - name: Helm upgrade staging (when kubeconfig available)
        run: |
          if [ -n "${KUBECONFIG:-}" ] || [ -f "$HOME/.kube/config" ]; then
            helm upgrade --install unishield-staging infra/helm/unishield \
              -f infra/helm/unishield/values.local.yml \
              --namespace unishield-staging --create-namespace \
              --set image.api.tag=staging \
              --set image.frontend.tag=staging
            kubectl rollout status deployment/unishield-staging-unishield-api -n unishield-staging --timeout=120s || true
          else
            echo "No kubeconfig — skipping cluster deploy (local CI)"
          fi

      - name: Smoke test API health
        run: |
          docker run -d --name unishield-smoke -p 18000:8000 \
            -e UNISHIELD_USE_SQLITE=1 -e AUTO_SEED=false unishield-api:staging
          sleep 8
          curl -sf http://localhost:18000/api/v1/health
          docker rm -f unishield-smoke
