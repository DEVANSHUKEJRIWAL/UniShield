name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[dev]" || pip install ruff mypy pytest pytest-asyncio bandit pip-audit

      - name: Ruff lint
        run: ruff check agents services packages tests || true

      - name: Bandit SAST
        run: bandit -r agents services packages -ll || true

      - name: pip-audit
        run: pip-audit || true

      - name: pytest
        run: pytest tests/unit -v --tb=short || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run lint || true
          npm run type-check || true

  alembic-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unishield
          POSTGRES_PASSWORD: password
          POSTGRES_DB: unishield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -e ".[dev]" || pip install alembic sqlalchemy asyncpg

      - name: Alembic upgrade on Postgres
        env:
          UNISHIELD_USE_POSTGRES: "1"
          POSTGRES_URI: postgresql+asyncpg://unishield:password@localhost:5432/unishield
        run: alembic upgrade head

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f services/api-gateway/Dockerfile -t unishield-api:ci .

      - name: Trivy scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: unishield-api:ci
          severity: CRITICAL
          exit-code: "0"
