name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r unishield/requirements.txt

      - name: Ruff lint
        run: ruff check services packages unishield openclaw_sdk || true

      - name: pytest (orchestrator + SCR)
        run: pytest unishield/tests openclaw_sdk/tests -v --tb=short

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run lint || true
          npm run type-check || true
          npm run build

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f services/api-gateway/Dockerfile -t unishield-api:ci .

      - name: Build orchestrator image
        run: docker build -f unishield/Dockerfile -t unishield-orchestrator:ci .
