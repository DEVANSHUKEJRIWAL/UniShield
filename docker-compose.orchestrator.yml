# Optional full stack: OpenClaw gateway + orchestrator + SCR worker.
# OpenClaw WebSocket: localhost:18789
services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    init: true
    restart: unless-stopped
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      # Bind to all interfaces inside the container so Docker port forwarding works.
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_API_KEY:-}}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-${HOME:-/tmp}/.openclaw/workspace}:/home/node/.openclaw/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  kafka:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: unishield
      POSTGRES_PASSWORD: unishield
      POSTGRES_DB: unishield
    ports:
      - "5434:5432"

  orchestrator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      OPENCLAW_GATEWAY_WS_URL: ws://openclaw:18789/
      OPENCLAW_MOCK_MODE: "false"
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_DSN: postgresql://unishield:unishield@postgres:5432/unishield
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      openclaw:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      postgres:
        condition: service_started

  scr-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m backend.scr.worker
    environment:
      OPENCLAW_GATEWAY_WS_URL: ws://openclaw:18789/
      OPENCLAW_MOCK_MODE: "false"
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_DSN: postgresql://unishield:unishield@postgres:5432/unishield
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - orchestrator
      - redis
      - kafka
      - postgres
