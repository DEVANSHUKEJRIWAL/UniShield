version: "3.9"

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      - "18789:18789"
      - "3000:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: unishield
      POSTGRES_PASSWORD: unishield
      POSTGRES_DB: unishield
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unishield"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: ..
      dockerfile: unishield/Dockerfile
    command: uvicorn unishield.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      OPENCLAW_GATEWAY_WS_URL: ws://openclaw:18789/gateway
      OPENCLAW_MOCK_MODE: "true"
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_DSN: postgresql://unishield:unishield@postgres:5432/unishield
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      openclaw:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  scr-worker:
    build:
      context: ..
      dockerfile: unishield/Dockerfile
    command: python -m unishield.agents.scr.worker
    environment:
      OPENCLAW_GATEWAY_WS_URL: ws://openclaw:18789/gateway
      OPENCLAW_MOCK_MODE: "true"
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_DSN: postgresql://unishield:unishield@postgres:5432/unishield
    depends_on:
      - orchestrator
      - redis
      - kafka
      - postgres
