# Minimal infrastructure for local UniShield orchestrator development.
# Uses host port 5434 for Postgres to avoid clashing with the main stack (5432)
# and TimescaleDB (5433).
services:
  redis:
    image: redis:7-alpine
    container_name: unishield-orchestrator-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: unishield-orchestrator-postgres
    environment:
      POSTGRES_USER: unishield
      POSTGRES_PASSWORD: unishield
      POSTGRES_DB: unishield
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unishield -d unishield"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  kafka:
    image: redpandadata/redpanda:v24.1.1
    container_name: unishield-orchestrator-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://127.0.0.1:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
