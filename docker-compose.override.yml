# Developer overrides — loaded automatically by docker compose
services:
  api-gateway:
    volumes:
      - ./gateway:/app/gateway
      - ./core:/app/core
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev
