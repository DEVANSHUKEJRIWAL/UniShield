# Developer overrides — loaded automatically by docker compose
services:
  postgres:
    ports:
      - "5432:5432"

  api-gateway:
    volumes:
      - ./services/api-gateway:/app/services/api-gateway
      - ./agents:/app/agents
      - ./packages:/app/packages
    command: uvicorn services.api_gateway.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev
