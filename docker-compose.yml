services:
  postgres:
    image: postgres:16-alpine
    container_name: unishield-postgres
    environment:
      POSTGRES_USER: unishield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: unishield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unishield"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unishield

  redis:
    image: redis:7-alpine
    container_name: unishield-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unishield

  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: unishield-api-gateway
    profiles: ["app"]
    env_file:
      - .env
    environment:
      UNISHIELD_ORCHESTRATOR_URL: ${UNISHIELD_ORCHESTRATOR_URL:-http://host.docker.internal:8001}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - api_data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - unishield

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unishield-frontend
    profiles: ["app"]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_ORCHESTRATOR_UI: ${NEXT_PUBLIC_ORCHESTRATOR_UI:-true}
      NEXT_PUBLIC_ORCHESTRATOR_DASHBOARD_METRICS: ${NEXT_PUBLIC_ORCHESTRATOR_DASHBOARD_METRICS:-true}
    depends_on:
      - api-gateway
    networks:
      - unishield

volumes:
  postgres_data:
  redis_data:
  api_data:

networks:
  unishield:
    driver: bridge
