services:
  postgres:
    image: postgres:16-alpine
    container_name: unishield-postgres
    environment:
      POSTGRES_USER: unishield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: unishield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unishield"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unishield

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: unishield-timescaledb
    environment:
      POSTGRES_USER: unishield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: unishield_metrics
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unishield"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unishield

  neo4j:
    image: neo4j:5-community
    container_name: unishield-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - unishield

  redis:
    image: redis:7-alpine
    container_name: unishield-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unishield

  qdrant:
    image: qdrant/qdrant:latest
    container_name: unishield-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unishield

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: unishield-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - unishield

  vault:
    image: hashicorp/vault:1.15
    container_name: unishield-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unishield

  # Infrastructure profile — start with: docker compose up -d infra
  infra:
    image: alpine:3.20
    profiles: ["infra"]
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      vault:
        condition: service_healthy
    command: ["sh", "-c", "echo 'UniShield infrastructure ready' && sleep infinity"]
    networks:
      - unishield

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: unishield-api-gateway
    profiles: ["app"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - unishield

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unishield-frontend
    profiles: ["app"]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api-gateway
    networks:
      - unishield

volumes:
  postgres_data:
  timescale_data:
  neo4j_data:
  redis_data:
  qdrant_data:
  elasticsearch_data:

networks:
  unishield:
    driver: bridge
