apiVersion: apps/v1
kind: Deployment
metadata:
  name: unishield-agent-siem
  namespace: unishield-dev
  labels:
    app: agent-siem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-siem
  template:
    metadata:
      labels:
        app: agent-siem
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agent-worker
          image: unishield-agent-worker:latest
          command: ["python3", "-m", "agents.worker", "--agent", "siem-analysis-agent"]
          envFrom:
            - secretRef:
                name: unishield-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
